# ============================================================
# HEZO Generation Agent — AgentCore Runtime 설정 (v2.0)
# 런타임: Amazon Bedrock AgentCore Runtime (커스텀 Python 컨테이너)
# 입력: P1이 생성한 G slot-based Contract JSON (schema_version 0.1.0)
# 출력: render_spec.json + GEO 파일 4종 (S3 직접 저장)
# ============================================================

AgentName: hezo-generation-agent
RuntimeType: AgentCoreRuntime          # v1.2의 ManagedBedrockAgent에서 전환
Description: >
  P1 챗봇이 생성한 G slot-based Contract JSON을 받아
  P3 빌드 워커가 실행할 수 있는 render_spec.json을 생성하는 에이전트.
  SEO 메타데이터, Schema.org JSON-LD, FAQ, QuickAnswer, llms.txt를 포함한
  AI-friendly 정적 사이트 명세를 조립한다.

# AgentCore Runtime 컨테이너 설정
Container:
  Image: "{ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com/hezo-generation-agent:latest"
  Port: 8080
  HealthCheck: GET /health
  InvokeEndpoint: POST /invoke

# 실행 모델 (에이전트 코드가 직접 boto3로 호출)
FoundationModel: global.anthropic.claude-sonnet-4-6

# 환경변수 (컨테이너 실행 환경)
EnvironmentVariables:
  ARTIFACTS_BUCKET: hezo-artifacts
  SITE_BUCKET: hezo-sites
  MODEL_ID: global.anthropic.claude-sonnet-4-6
  QUALITY_THRESHOLD: "50"
  MAX_RETRIES: "2"
  AWS_DEFAULT_REGION: ap-northeast-2

# 실행 역할
ExecutionRoleArn: "arn:aws:iam::{ACCOUNT_ID}:role/hezo-agentcore-execution-role"

# Step Functions 연동 (변경 없음 — bedrock:invokeAgent 동일 사용)
StepFunctionsIntegration:
  Resource: "arn:aws:states:::bedrock:invokeAgent"
  Parameters:
    AgentId: "${SSM:hezo-generation-agent-id}"
    AgentAliasId: "${SSM:hezo-generation-agent-alias-id}"
    SessionId: "$.site_id"
    InputText: "States.Format('site_id={} contract_ref={}', $.site_id, $.approved_contract_ref)"

# 도구 계층 (v2.0: Lambda Action Group → 에이전트 내부 Python 모듈)
# v1.2에서 별도 Lambda 함수였던 것들이 agents/generation/tools/에 내장됨
InternalTools:
  - name: contract_loader
    module: agents.generation.tools.contract_loader
    function: load_contract
  - name: render_spec_saver
    module: agents.generation.tools.render_spec_saver
    function: save_render_spec

# 확장 포인트 (Python 함수 추가만으로 보강)
Evaluators:
  - module: agents.generation.evaluators.render_spec_evaluator
    function: evaluate_render_spec
    threshold: 50       # 이 점수 미달 시 재생성 (최대 MAX_RETRIES회)

Guardrails:
  - module: agents.generation.guardrails.content_guardrail
    function: check_guardrails

IdleSessionTTLInSeconds: 600

# ============================================================
# 시스템 프롬프트 (에이전트 코드 agent.py의 _SYSTEM_PROMPT와 동일 내용 참조)
# ============================================================
AgentInstructions: |
  당신은 HEZO의 AI 친화 홈페이지 생성 전문가입니다.
  Contract JSON을 받아 render_spec.json을 생성하세요.
  출력: 순수 JSON만 (마크다운 없음).
  [상세 매핑 규칙은 agent.py _SYSTEM_PROMPT 참조]
