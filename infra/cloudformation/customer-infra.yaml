AWSTemplateFormatVersion: '2010-09-09'
Description: >
  HEZO Customer Per-Tenant Infrastructure.
  고객 1명 = 스택 1개.
  정적 파일은 공유 hezo-sites/{site_id}/ 버킷 그대로 사용.
  CloudFormation이 담당: VPC + EC2(hezo-customer-backend Docker + MariaDB) + CloudFront + Route53.

# ══════════════════════════════════════════════════════════════════════════════
# Parameters
# ══════════════════════════════════════════════════════════════════════════════
Parameters:
  SiteId:
    Type: String
    Description: HEZO site_id (e.g. site_tax_13_001)
    AllowedPattern: '[a-zA-Z0-9_\-]+'

  DomainName:
    Type: String
    Default: ''
    Description: 고객사 소유 도메인 (e.g. hezo.doodo.cloud). 비워두면 CloudFront 기본 도메인으로 테스트 가능.

  HostedZoneId:
    Type: String
    Default: ''
    Description: Route 53 Hosted Zone ID. DomainName이 있을 때만 필요.

  WildcardCertArn:
    Type: String
    Default: ''
    Description: ACM 인증서 ARN (고객 도메인 기준 발급, us-east-1). DomainName이 있을 때만 필요.

  HezoSitesBucketName:
    Type: String
    Default: hezo-sites
    Description: P3가 정적 파일을 올리는 공유 S3 버킷명

  HezoSitesBucketRegionalDomain:
    Type: String
    Description: hezo-sites 버킷 Regional Domain (e.g. hezo-sites.s3.ap-northeast-2.amazonaws.com)

  EcrImage:
    Type: String
    Description: hezo-customer-backend ECR 이미지 URI (e.g. 492554570964.dkr.ecr.ap-northeast-2.amazonaws.com/hezo-customer-backend:latest)

  TemplateType:
    Type: String
    Description: 템플릿 슬러그 (e.g. tax-accounting, dental, cafe-menu). hezo-customer-backend 환경변수로 주입.

  TemplateCategory:
    Type: String
    Default: landing
    AllowedValues: [landing, blog, store]
    Description: 템플릿 카테고리

  DBPassword:
    Type: String
    NoEcho: true
    Default: 'Hezo1234!'
    Description: MariaDB hezo 사용자 비밀번호 (EC2 로컬 전용, 외부 노출 없음)

  EC2InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]

  EC2KeyName:
    Type: String
    Default: ''
    Description: EC2 SSH 키 페어 이름 (비워두면 SSM Session Manager로 접속)

  VpcCidrBlock:
    Type: String
    Default: '10.100.0.0/16'
    Description: 고객 전용 VPC CIDR

# ══════════════════════════════════════════════════════════════════════════════
# Conditions
# ══════════════════════════════════════════════════════════════════════════════
Conditions:
  HasKeyName:      !Not [!Equals [!Ref EC2KeyName, '']]
  HasCustomDomain: !Not [!Equals [!Ref DomainName, '']]

# ══════════════════════════════════════════════════════════════════════════════
# Resources
# ══════════════════════════════════════════════════════════════════════════════
Resources:

  # ── VPC ─────────────────────────────────────────────────────────────────────
  CustomerVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}
        - Key: hezo:site-id
          Value: !Ref SiteId

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref CustomerVPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidrBlock, 4, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-public

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref CustomerVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CustomerVPC
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-rtb

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── 보안그룹 ─────────────────────────────────────────────────────────────────
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub HEZO customer EC2 API server (${SiteId})
      VpcId: !Ref CustomerVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: '0.0.0.0/0'
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-ec2-sg

  # ── IAM (EC2용) ──────────────────────────────────────────────────────────────
  EC2IAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub hezo-customer-${SiteId}-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: HezoCustomerSiteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # 공유 hezo-sites 버킷에서 해당 site_id 경로만 읽기
              - Effect: Allow
                Action: ['s3:GetObject']
                Resource: !Sub 'arn:aws:s3:::${HezoSitesBucketName}/${SiteId}/*'
              # ECR에서 hezo-customer-backend 이미지 pull
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchCheckLayerAvailability
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/hezo-customer-backend'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub hezo-customer-${SiteId}-ec2-profile
      Roles:
        - !Ref EC2IAMRole

  # ── EC2 (hezo-customer-backend Docker + MariaDB) ─────────────────────────────
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref EC2InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !If [HasKeyName, !Ref EC2KeyName, !Ref AWS::NoValue]
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-ec2
        - Key: hezo:site-id
          Value: !Ref SiteId
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/hezo-setup.log 2>&1

          dnf update -y
          dnf install -y mariadb105-server docker

          # MariaDB 시작
          systemctl start mariadb
          systemctl enable mariadb

          # DB/유저 생성
          # localhost = Unix 소켓, 127.0.0.1 = TCP (Docker --network host 연결용 — 둘 다 필요)
          mysql -u root -e "
            CREATE DATABASE IF NOT EXISTS hezo_site CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS 'hezo'@'localhost' IDENTIFIED BY '${DBPassword}';
            CREATE USER IF NOT EXISTS 'hezo'@'127.0.0.1' IDENTIFIED BY '${DBPassword}';
            GRANT ALL PRIVILEGES ON hezo_site.* TO 'hezo'@'localhost';
            GRANT ALL PRIVILEGES ON hezo_site.* TO 'hezo'@'127.0.0.1';
            FLUSH PRIVILEGES;
          "

          # Docker 시작
          systemctl start docker
          systemctl enable docker

          # ECR 로그인 (EC2 IAM 역할 기반 — 키 불필요)
          ECR_REGISTRY=$(echo ${EcrImage} | cut -d'/' -f1)
          aws ecr get-login-password --region ${AWS::Region} \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          # hezo-customer-backend 컨테이너 실행
          docker pull ${EcrImage}
          docker run -d \
            --name hezo-customer-backend \
            --restart unless-stopped \
            --network host \
            -e TEMPLATE_TYPE="${TemplateType}" \
            -e TEMPLATE_CATEGORY="${TemplateCategory}" \
            -e SITE_ID="${SiteId}" \
            -e DB_URL="mysql+pymysql://hezo:${DBPassword}@127.0.0.1/hezo_site" \
            -e DB_HOST="127.0.0.1" \
            -e DB_PORT="3306" \
            -e DB_NAME="hezo_site" \
            -e DB_USER="hezo" \
            -e DB_PASSWORD="${DBPassword}" \
            ${EcrImage}

          echo "hezo-customer-backend setup complete"

  EC2EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance

  # ── CloudFront OAC (공유 hezo-sites 버킷 접근용) ─────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub hezo-oac-${SiteId}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront ───────────────────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: EC2EIP
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub HEZO customer — ${SiteId}
        Aliases: !If
          - HasCustomDomain
          - [!Ref DomainName]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref WildcardCertArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        DefaultRootObject: index.html
        HttpVersion: http2
        Origins:
          # 공유 hezo-sites 버킷. OriginPath로 해당 site_id 경로만 서빙 (P3 출력: hezo-sites/{site_id}/)
          - Id: S3StaticOrigin
            DomainName: !Ref HezoSitesBucketRegionalDomain
            OriginPath: !Sub /${SiteId}
            S3OriginConfig: {}
            OriginAccessControlId: !Ref CloudFrontOAC
          # 고객사 전용 EC2 (hezo-customer-backend :8080)
          # CloudFront는 IP 오리진 미지원 → PublicDnsName 사용
          - Id: EC2ApiOrigin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: S3StaticOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: '/api/*'
            TargetOriginId: EC2ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
          - PathPattern: '/auth/*'
            TargetOriginId: EC2ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ── Route 53 (커스텀 도메인이 있을 때만 생성) ─────────────────────────────────
  CustomerDNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        EvaluateTargetHealth: false
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront 전용 고정 Hosted Zone ID

# ══════════════════════════════════════════════════════════════════════════════
# Outputs — Step Functions ResultSelector 대상 (순서 고정, 변경 금지)
# ══════════════════════════════════════════════════════════════════════════════
Outputs:
  DomainUrl:
    Description: 고객사 사이트 URL
    Value: !If
      - HasCustomDomain
      - !Sub 'https://${DomainName}'
      - !Sub 'https://${CloudFrontDistribution.DomainName}'

  CloudFrontDistributionId:
    Description: CloudFront 배포 ID (캐시 무효화용)
    Value: !Ref CloudFrontDistribution

  CloudFrontDomainName:
    Description: CloudFront 도메인명
    Value: !GetAtt CloudFrontDistribution.DomainName

  EC2InstanceId:
    Description: EC2 인스턴스 ID
    Value: !Ref EC2Instance

  EC2PublicIp:
    Description: EC2 퍼블릭 IP
    Value: !GetAtt EC2EIP.PublicIp

  StaticSitePrefix:
    Description: 정적 파일 S3 경로 (공유 버킷 내 prefix)
    Value: !Sub '${HezoSitesBucketName}/${SiteId}/'
