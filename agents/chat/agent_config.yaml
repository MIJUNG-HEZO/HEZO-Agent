# ============================================================
# HEZO Chat Agent — MVP Skeleton 설정
# 입력: 사용자 메시지 + domain/slot context + P2 domain markdown metadata
# 출력: Contract JSON draft state (mock)
# ============================================================

AgentName: hezo-chat-agent
Description: >
  P1 채팅 에이전트. 사용자 대화에서 도메인을 확정하고,
  P2 markdown을 요청/수신 검수한 뒤 적극적 질의를 통해
  G slot-based Contract JSON 초안을 구성한다.

FoundationModel: anthropic.claude-sonnet-4-5-20250929-v1:0
IdleSessionTTLInSeconds: 600

Stages:
  - name: domain_selection
    description: 사용자 대화에서 도메인/업종을 확정한다.

  - name: p2_markdown_request
    description: 확정된 도메인과 slot_registry를 기준으로 P2 markdown 요청 payload를 만든다.
    required_fields:
      - payload_version
      - target_artifact
      - slot_registry
      - missing_slots
      - request_reason

  - name: p2_markdown_parse
    description: P2 markdown artifact 원문을 P1 내부 slot 질문/근거 구조로 정규화한다.
    required_fields:
      - parse_status
      - slot_question_hints
      - required_slot_questions
      - evidence_refs
      - warnings

  - name: p2_markdown_review
    description: P2 markdown을 수신 검수하고 적극적 질의에 사용할 수 있는지 판단한다.
    required_fields:
      - p2_confidence
      - p1_markdown_review_status
      - p1_markdown_review_score
      - p2_markdown_usable_for_questions

  - name: proactive_questioning
    description: P2 markdown과 slot_registry를 기반으로 부족한 정보를 질문한다.
    required_fields:
      - question_candidates
      - slot
      - question
      - priority
      - source
      - fallback

  - name: slot_answer_state
    description: 사용자 답변을 known_answers에 반영하고 missing_slots를 갱신한다.
    required_fields:
      - answer_status
      - answered_slot
      - known_answers
      - missing_slots
      - reasons

  - name: contract_compile
    description: 사용자 응답과 보완 정보를 G slot-based Contract JSON draft로 조립한다.
    required_fields:
      - contract_status
      - quality_status
      - contract_version
      - missing_required_slots
      - filled_slots

  - name: contract_quality_check
    description: Contract JSON이 preview/generation 소비 조건에 충분한지 판단한다.
    required_fields:
      - quality_status
      - preview_ready
      - generation_ready
      - quality_score
      - reasons

  - name: storage_guardrails
    description: S3 저장 전 사용자 입력/P2 markdown/Contract draft/LLM 출력 안전 검사를 수행한다.
    required_fields:
      - guardrail_target
      - guardrail_action
      - store_allowed
      - guardrail_reasons

  - name: chat_state_checkpoint
    description: DynamoDB single-table 기준으로 세션 상태와 체크포인트 저장 경계를 정의한다.
    required_fields:
      - session_pk
      - metadata_sk
      - message_sk
      - checkpoint_sk
      - latest_checkpoint

  - name: s3_artifact_storage
    description: S3 bucket/key 기준으로 P2 markdown, transcript, Contract artifact 저장 경계를 정의한다.
    required_fields:
      - transcript_bucket
      - p2_markdown_bucket
      - contract_bucket
      - transcript_key
      - contract_draft_key
      - contract_final_key

  - name: bedrock_claude_invocation
    description: Bedrock Claude 호출 입력/출력 경계를 정의하고 LLM 보완 결과를 정규화한다.
    required_fields:
      - use_case
      - model_id
      - invocation_status
      - output_text
      - usage
      - latency_ms

  - name: bedrock_guardrails_apply
    description: Bedrock Guardrails ApplyGuardrail 입력/출력 경계를 정의한다.
    required_fields:
      - guardrail_id
      - guardrail_version
      - guardrail_source
      - guardrail_action
      - guardrail_status
      - assessments

  - name: chat_graph
    description: P1 채팅 에이전트 stage들을 deterministic graph 순서로 연결한다.
    required_fields:
      - graph_node_order
      - graph_final_stage
      - graph_checkpoint_ref
      - graph_artifact_refs

