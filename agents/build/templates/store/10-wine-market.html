<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cave Bottle</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:#140b0d;color:#fff4e8}a{text-decoration:none;color:inherit}button{font:inherit;border:0;cursor:pointer}
    .nav{height:76px;padding:0 6vw;display:flex;align-items:center;justify-content:space-between;position:fixed;inset:0 0 auto;z-index:20;background:rgba(20,11,13,.88);backdrop-filter:blur(16px)}
    .brand{font-size:27px;font-weight:950}
    .nav-links{display:flex;gap:28px;font-weight:850;align-items:center}
    .filter-btn{background:none;color:#fff4e8;font-weight:850;padding:8px 0;border-bottom:2px solid transparent;border-radius:0}
    .filter-btn.active{border-bottom-color:#b8905d;color:#b8905d}
    .cart-btn{background:#b8905d;color:#140b0d;padding:12px 22px;border-radius:999px;font-weight:950;cursor:pointer}
    .hero{min-height:100vh;position:relative;display:grid;place-items:center;padding:120px 6vw;background:linear-gradient(rgba(20,11,13,.65),rgba(20,11,13,.65)),url("https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=1800&q=85") center/cover}
    .wine-card{width:min(760px,86vw);padding:54px;border-radius:62px;background:#fff8ef;color:#1d1114;box-shadow:0 40px 120px rgba(0,0,0,.45)}
    .photo{height:520px;border-radius:42px;background:url("https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?auto=format&fit=crop&w=1100&q=85") center/cover;margin-bottom:36px}
    .wine-card small{color:#b8905d;font-size:15px;font-weight:950;letter-spacing:5px}
    .row{display:flex;justify-content:space-between;gap:28px;align-items:end;margin-top:14px}
    .row h1{font-size:58px;letter-spacing:-3px}.row p{color:#856b61;font-size:22px;font-weight:800;margin-top:8px}
    .price{font-size:44px;color:#7e2036;font-weight:950;white-space:nowrap}
    .shop{padding:90px 6vw;background:#fff8ef;color:#1d1114}
    .shop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
    .shop h2{font-size:64px}
    .cat-tabs{display:flex;gap:12px}
    .cat-tab{padding:10px 20px;border-radius:999px;border:1.5px solid #dac4b1;background:none;color:#856b61;font-weight:850;cursor:pointer}
    .cat-tab.active{background:#1d1114;color:#fff8ef;border-color:#1d1114}
    .list{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid #dac4b1;border-left:1px solid #dac4b1}
    .item{padding:24px;border-right:1px solid #dac4b1;border-bottom:1px solid #dac4b1}
    .item-img{height:300px;background-size:cover;background-position:center;margin-bottom:18px;border-radius:8px}
    .item h3{font-size:18px;font-weight:900;margin-bottom:6px}
    .item p{color:#856b61;font-size:14px;margin-bottom:12px}
    .buy{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
    .buy strong{font-size:18px;font-weight:900}
    .buy button{background:#1d1114;color:#fff8ef;border-radius:999px;padding:10px 16px;font-weight:900}
    .buy button:hover{background:#7e2036}

    /* Cart Drawer */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;opacity:0;pointer-events:none;transition:.25s}
    .overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,96vw);background:#fff8ef;color:#1d1114;z-index:40;transform:translateX(100%);transition:.3s;display:flex;flex-direction:column}
    .drawer.open{transform:translateX(0)}
    .drawer-head{padding:24px;border-bottom:1px solid #dac4b1;display:flex;justify-content:space-between;align-items:center}
    .drawer-head h3{font-size:22px;font-weight:950}
    .drawer-close{background:none;font-size:24px;color:#856b61;cursor:pointer}
    .drawer-body{flex:1;overflow-y:auto;padding:16px 24px}
    .drawer-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #f0e0d0;gap:12px}
    .drawer-item b{font-size:15px;display:block;margin-bottom:8px}
    .qty-row{display:flex;align-items:center;gap:10px}
    .qty-row button{width:28px;height:28px;border-radius:50%;background:#f0e0d0;font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center}
    .qty-row span{font-size:16px;font-weight:700;min-width:20px;text-align:center}
    .del-btn{background:none;color:#b05050;font-size:12px;cursor:pointer;margin-top:6px;display:block}
    .drawer-foot{padding:24px;border-top:1px solid #dac4b1}
    .drawer-total{font-size:18px;font-weight:950;margin-bottom:14px}
    .checkout-btn{width:100%;padding:16px;background:#7e2036;color:#fff;border-radius:999px;font-size:16px;font-weight:950;cursor:pointer}
    .checkout-btn:hover{background:#5e1828}

    /* Checkout Modal */
    .modal{position:fixed;inset:0;z-index:50;display:none;place-items:center;padding:20px}
    .modal.open{display:grid}
    .modal-box{background:#fff8ef;color:#1d1114;border-radius:28px;width:min(480px,96vw);padding:40px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
    .modal-box h3{font-size:26px;font-weight:950;margin-bottom:24px}
    .modal-box input{width:100%;padding:14px 16px;border:1.5px solid #dac4b1;border-radius:12px;font-size:15px;margin-bottom:12px;background:#fffaf5}
    .modal-box input:focus{outline:none;border-color:#7e2036}
    .order-btn{width:100%;padding:16px;background:#7e2036;color:#fff;border-radius:999px;font-size:16px;font-weight:950;cursor:pointer;margin-top:8px}
    .cancel-btn{width:100%;padding:14px;background:none;color:#856b61;font-size:15px;cursor:pointer;margin-top:8px}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1114;color:#fff8ef;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:700;z-index:60;animation:fadeup .25s ease}
    @keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    @media(max-width:900px){.nav-links .filter-btn{display:none}.wine-card{padding:24px}.photo{height:340px}.row{display:block}.list{grid-template-columns:1fr 1fr}.row h1{font-size:42px}.cat-tabs{display:none}}
  </style>
</head>
<body>
  <header class="nav">
    <a class="brand" data-hezo="brand-name">Cave Bottle</a>
    <div class="nav-links">
      <button class="filter-btn active" data-cat="" onclick="filterCategory('')">All</button>
      <button class="filter-btn" data-cat="Red" onclick="filterCategory('Red')">Red</button>
      <button class="filter-btn" data-cat="White" onclick="filterCategory('White')">White</button>
      <button class="filter-btn" data-cat="Pairing" onclick="filterCategory('Pairing')">Pairing</button>
      <button class="cart-btn" id="cartBtn" onclick="openCart()">Cart 0</button>
    </div>
  </header>

  <section class="hero">
    <article class="wine-card">
      <div class="photo"></div>
      <small>TONIGHT PICK</small>
      <div class="row">
        <div>
          <h1 data-hezo="hero-headline">Burgundy Pinot</h1>
          <p data-hezo="hero-subheadline">치즈와 가벼운 파스타 추천</p>
        </div>
        <strong class="price">₩68,000</strong>
      </div>
    </article>
  </section>

  <section class="shop">
    <div class="shop-head">
      <h2 data-hezo="section-cta-title">Bottle list</h2>
      <div class="cat-tabs">
        <button class="cat-tab active" onclick="filterCategory('')">전체</button>
        <button class="cat-tab" onclick="filterCategory('Red')">Red</button>
        <button class="cat-tab" onclick="filterCategory('White')">White</button>
        <button class="cat-tab" onclick="filterCategory('Pairing')">Pairing</button>
      </div>
    </div>
    <div class="list" id="productList">
      <article class="item"><div class="item-img" style="background-image:url('https://images.unsplash.com/photo-1553361371-9b22f78e8b1d?auto=format&fit=crop&w=800&q=85')"></div><h3 data-hezo="service-name">Cabernet</h3><p data-hezo="service-desc">Steak pairing</p><div class="buy"><strong>₩58,000</strong><button>담기</button></div></article>
      <article class="item"><div class="item-img" style="background-image:url('https://images.unsplash.com/photo-1566769284323-52a7831d4e0e?auto=format&fit=crop&w=800&q=85')"></div><h3>Chardonnay</h3><p>Creamy white</p><div class="buy"><strong>₩49,000</strong><button>담기</button></div></article>
      <article class="item"><div class="item-img" style="background-image:url('https://images.unsplash.com/photo-1516594915697-87eb3b1c14ea?auto=format&fit=crop&w=800&q=85')"></div><h3>Sparkling</h3><p>Party bottle</p><div class="buy"><strong>₩42,000</strong><button>담기</button></div></article>
      <article class="item"><div class="item-img" style="background-image:url('https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?auto=format&fit=crop&w=800&q=85')"></div><h3>Pinot Noir</h3><p>Cherry note</p><div class="buy"><strong>₩68,000</strong><button>담기</button></div></article>
    </div>
  </section>

  <!-- Cart Drawer -->
  <div class="overlay" id="drawerOverlay" onclick="closeAll()"></div>
  <aside class="drawer" id="cartDrawer">
    <div class="drawer-head">
      <h3>장바구니</h3>
      <button class="drawer-close" onclick="closeCart()">✕</button>
    </div>
    <div class="drawer-body" id="drawerItems"></div>
    <div class="drawer-foot">
      <div class="drawer-total" id="drawerTotal"></div>
      <button class="checkout-btn" id="drawerCheckoutBtn" onclick="openCheckout()" style="display:none">결제하기</button>
    </div>
  </aside>

  <!-- Checkout Modal -->
  <div class="modal" id="checkoutModal">
    <div class="modal-box">
      <h3>주문 정보</h3>
      <form id="orderForm">
        <input id="o-name" placeholder="성함" required autocomplete="name" />
        <input id="o-phone" placeholder="연락처" type="tel" required autocomplete="tel" />
        <input id="o-addr" placeholder="배송 주소" required autocomplete="street-address" />
        <button class="order-btn" type="submit">주문 완료</button>
        <button class="cancel-btn" type="button" onclick="closeCheckout()">취소</button>
      </form>
    </div>
  </div>

<script>
(function(){
  var IMGS=[
    'https://images.unsplash.com/photo-1553361371-9b22f78e8b1d?auto=format&fit=crop&w=800&q=85',
    'https://images.unsplash.com/photo-1566769284323-52a7831d4e0e?auto=format&fit=crop&w=800&q=85',
    'https://images.unsplash.com/photo-1516594915697-87eb3b1c14ea?auto=format&fit=crop&w=800&q=85',
    'https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?auto=format&fit=crop&w=800&q=85',
    'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=800&q=85',
    'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&w=800&q=85'
  ];
  var SID=localStorage.getItem('hezo_sid')||(function(){var s=Math.random().toString(36).slice(2);localStorage.setItem('hezo_sid',s);return s;})();
  var allProducts=[];

  function renderProducts(products){
    allProducts=products;
    var el=document.getElementById('productList');
    if(!products||!products.length)return;
    el.innerHTML=products.map(function(p,i){
      var img=(p.data&&p.data.img)||IMGS[i%IMGS.length];
      return '<article class="item">'
        +'<div class="item-img" style="background-image:url(\''+img+'\')"></div>'
        +'<h3>'+p.name+'</h3>'
        +'<p>'+(p.description||'')+'</p>'
        +'<div class="buy"><strong>₩'+Number(p.price).toLocaleString()+'</strong>'
        +'<button onclick="addToCart(\''+p.id+'\',\''+p.name+'\','+p.price+')">담기</button>'
        +'</div></article>';
    }).join('');
  }

  window.filterCategory=function(cat){
    var url=cat?'/api/products?category='+encodeURIComponent(cat):'/api/products';
    fetch(url).then(function(r){return r.json();}).then(renderProducts).catch(function(){});
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.cat===cat);});
    document.querySelectorAll('.cat-tab').forEach(function(b){b.classList.toggle('active',b.textContent===(cat||'전체'));});
  };

  window.addToCart=function(productId,name,price){
    fetch('/api/cart/items',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:SID,product_id:productId,quantity:1})
    }).then(function(r){return r.json();}).then(function(){
      refreshCartCount();
      toast(name+' 담겼습니다 🍷');
    }).catch(function(){});
  };

  function refreshCartCount(){
    fetch('/api/cart?session_id='+SID).then(function(r){return r.json();}).then(function(items){
      var count=items.reduce(function(s,i){return s+i.quantity;},0);
      document.getElementById('cartBtn').textContent='Cart '+count;
    }).catch(function(){});
  }

  window.openCart=function(){
    fetch('/api/cart?session_id='+SID).then(function(r){return r.json();}).then(function(items){
      renderDrawer(items);
      document.getElementById('cartDrawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');
    }).catch(function(){});
  };

  window.closeCart=function(){
    document.getElementById('cartDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  };

  window.closeAll=function(){closeCart();closeCheckout();};

  function renderDrawer(items){
    var count=items.reduce(function(s,i){return s+i.quantity;},0);
    document.getElementById('cartBtn').textContent='Cart '+count;
    var el=document.getElementById('drawerItems');
    if(!items.length){
      el.innerHTML='<p style="text-align:center;color:#856b61;padding:48px 0">장바구니가 비어있습니다</p>';
      document.getElementById('drawerTotal').textContent='';
      document.getElementById('drawerCheckoutBtn').style.display='none';
      return;
    }
    var total=0;
    el.innerHTML=items.map(function(item){
      var prod=allProducts.find(function(p){return p.id===item.product_id;})||{};
      var name=prod.name||'상품';
      var price=Number(prod.price||0);
      var sub=price*item.quantity;
      total+=sub;
      return '<div class="drawer-item">'
        +'<div><b>'+name+'</b>'
        +'<div class="qty-row">'
        +'<button onclick="updateItem(\''+item.id+'\','+(item.quantity-1)+')">−</button>'
        +'<span>'+item.quantity+'</span>'
        +'<button onclick="updateItem(\''+item.id+'\','+(item.quantity+1)+')">+</button>'
        +'</div></div>'
        +'<div style="text-align:right">'
        +'<span style="font-weight:900">₩'+sub.toLocaleString()+'</span>'
        +'<button class="del-btn" onclick="deleteItem(\''+item.id+'\')">삭제</button>'
        +'</div></div>';
    }).join('');
    document.getElementById('drawerTotal').textContent='합계 ₩'+total.toLocaleString();
    document.getElementById('drawerCheckoutBtn').style.display='block';
  }

  window.updateItem=function(id,qty){
    if(qty<=0){deleteItem(id);return;}
    fetch('/api/cart/items/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({quantity:qty})
    }).then(function(){openCart();}).catch(function(){});
  };

  window.deleteItem=function(id){
    fetch('/api/cart/items/'+id,{method:'DELETE'}).then(function(){openCart();}).catch(function(){});
  };

  window.openCheckout=function(){
    closeCart();
    document.getElementById('checkoutModal').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
  };

  window.closeCheckout=function(){
    document.getElementById('checkoutModal').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  };

  document.getElementById('orderForm').addEventListener('submit',function(e){
    e.preventDefault();
    var btn=e.target.querySelector('.order-btn');
    btn.disabled=true;btn.textContent='처리 중...';
    fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        session_id:SID,
        customer:{name:document.getElementById('o-name').value,
          phone:document.getElementById('o-phone').value,
          address:document.getElementById('o-addr').value}
      })
    }).then(function(r){
      if(!r.ok)throw new Error();
      return r.json();
    }).then(function(){
      closeCheckout();
      document.getElementById('cartBtn').textContent='Cart 0';
      document.getElementById('orderForm').reset();
      toast('주문이 완료되었습니다! 감사합니다 🍾');
    }).catch(function(){
      btn.disabled=false;btn.textContent='주문 완료';
      toast('오류가 발생했습니다. 다시 시도해주세요.');
    });
  });

  function toast(msg){
    var t=document.createElement('div');
    t.className='toast';t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(function(){t.remove();},2500);
  }

  fetch('/api/products').then(function(r){return r.json();}).then(renderProducts).catch(function(){});
  refreshCartCount();
})();
</script>
</body>
</html>
