AWSTemplateFormatVersion: '2010-09-09'
Description: >
  HEZO Customer Per-Tenant Infrastructure.
  고객 1명 = 스택 1개. VPC + EC2(FastAPI+MySQL) + S3 + CloudFront + Route53.
  Step Functions cloudformation:createStack.sync 으로 자동 프로비저닝.

# ══════════════════════════════════════════════════════════════════════════════
# Parameters
# ══════════════════════════════════════════════════════════════════════════════
Parameters:
  SiteId:
    Type: String
    Description: HEZO site_id (e.g. site_tax_13_001)
    AllowedPattern: '[a-zA-Z0-9_\-]+'

  DomainName:
    Type: String
    Description: 고객사 서브도메인 (e.g. mybiz.hezo.io)

  HostedZoneId:
    Type: String
    Description: Route 53 Hosted Zone ID (hezo.io 또는 고객 도메인)

  WildcardCertArn:
    Type: String
    Description: ACM 와일드카드 인증서 ARN (*.hezo.io, 반드시 us-east-1 발급)

  EC2InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: 방문자 회원 API 서버 인스턴스 타입

  EC2KeyName:
    Type: String
    Default: ''
    Description: EC2 SSH 키 페어 이름 (비워두면 SSM Session Manager로 접속)

  VpcCidrBlock:
    Type: String
    Default: '10.100.0.0/16'
    Description: 고객 전용 VPC CIDR (기존 VPC와 겹치지 않도록 설정)

# ══════════════════════════════════════════════════════════════════════════════
# Conditions
# ══════════════════════════════════════════════════════════════════════════════
Conditions:
  HasKeyName: !Not [!Equals [!Ref EC2KeyName, '']]

# ══════════════════════════════════════════════════════════════════════════════
# Resources
# ══════════════════════════════════════════════════════════════════════════════
Resources:

  # ── VPC ─────────────────────────────────────────────────────────────────────
  CustomerVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}
        - Key: hezo:site-id
          Value: !Ref SiteId

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref CustomerVPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidrBlock, 4, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-public

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref CustomerVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CustomerVPC
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-rtb

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── 보안그룹 ─────────────────────────────────────────────────────────────────
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub HEZO customer EC2 API server (${SiteId})
      VpcId: !Ref CustomerVPC
      SecurityGroupIngress:
        # CloudFront → EC2: CloudFront IP는 고정 불가 → 추후 WAF + Managed Rule로 제한
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: '0.0.0.0/0'
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-ec2-sg

  # ── IAM (EC2용) ──────────────────────────────────────────────────────────────
  EC2IAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub hezo-customer-${SiteId}-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: SiteS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:GetObject', 's3:ListBucket']
                Resource:
                  - arn:aws:s3:::hezo-sites
                  - !Sub 'arn:aws:s3:::hezo-sites/${SiteId}/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub hezo-customer-${SiteId}-ec2-profile
      Roles:
        - !Ref EC2IAMRole

  # ── EC2 (FastAPI + MySQL — 방문자 회원 기능) ─────────────────────────────────
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref EC2InstanceType
      # Amazon Linux 2023 (arm64 — t3 시리즈는 x86_64)
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !If [HasKeyName, !Ref EC2KeyName, !Ref AWS::NoValue]
      Tags:
        - Key: Name
          Value: !Sub hezo-customer-${SiteId}-ec2
        - Key: hezo:site-id
          Value: !Ref SiteId
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          dnf update -y
          dnf install -y python3.12 python3.12-pip mysql-server

          systemctl start mysqld
          systemctl enable mysqld

          pip3.12 install fastapi "uvicorn[standard]" pymysql sqlalchemy

          mkdir -p /opt/hezo-site

          # 기본 헬스체크 앱 — 실제 방문자 회원 앱은 P4가 S3에서 배포
          cat > /opt/hezo-site/main.py << 'PYEOF'
          from fastapi import FastAPI
          import os

          app = FastAPI()

          @app.get("/api/health")
          def health():
              return {"status": "ok", "site_id": "${SiteId}"}
          PYEOF

          cat > /etc/systemd/system/hezo-site.service << 'SVCEOF'
          [Unit]
          Description=HEZO Site API (${SiteId})
          After=network.target mysqld.service
          [Service]
          Type=simple
          WorkingDirectory=/opt/hezo-site
          ExecStart=/usr/bin/python3.12 -m uvicorn main:app --host 0.0.0.0 --port 8000
          Restart=on-failure
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
          SVCEOF

          systemctl daemon-reload
          systemctl enable hezo-site
          systemctl start hezo-site

  EC2EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance

  # ── S3 정적 사이트 버킷 ──────────────────────────────────────────────────────
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hezo-site-${SiteId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: hezo:site-id
          Value: !Ref SiteId

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub hezo-oac-${SiteId}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  StaticSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: CloudFrontDistribution
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::hezo-site-${SiteId}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub
                  - 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistId}'
                  - DistId: !Ref CloudFrontDistribution

  # ── CloudFront ───────────────────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub HEZO customer site — ${SiteId}
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref WildcardCertArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultRootObject: index.html
        HttpVersion: http2
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref CloudFrontOAC
          - Id: EC2Origin
            DomainName: !GetAtt EC2EIP.PublicIp
            CustomOriginConfig:
              HTTPPort: 8000
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
        # 기본 → S3 정적 콘텐츠
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          # /api/* → EC2 (캐시 없음)
          - PathPattern: '/api/*'
            TargetOriginId: EC2Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
          # /auth/* → EC2 (캐시 없음)
          - PathPattern: '/auth/*'
            TargetOriginId: EC2Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
        # SPA fallback
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ── Route 53 ─────────────────────────────────────────────────────────────────
  CustomerDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        EvaluateTargetHealth: false
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront 전용 고정 Hosted Zone ID

# ══════════════════════════════════════════════════════════════════════════════
# Outputs — Step Functions ResultSelector 대상 (순서 고정)
# ══════════════════════════════════════════════════════════════════════════════
Outputs:
  DomainUrl:
    Description: 고객사 사이트 URL
    Value: !Sub 'https://${DomainName}'

  CloudFrontDistributionId:
    Description: CloudFront 배포 ID (캐시 무효화용)
    Value: !Ref CloudFrontDistribution

  CloudFrontDomainName:
    Description: CloudFront 도메인명
    Value: !GetAtt CloudFrontDistribution.DomainName

  EC2InstanceId:
    Description: EC2 인스턴스 ID
    Value: !Ref EC2Instance

  EC2PublicIp:
    Description: EC2 퍼블릭 IP
    Value: !GetAtt EC2EIP.PublicIp

  StaticSiteBucket:
    Description: 정적 파일 S3 버킷명
    Value: !Ref StaticSiteBucket
